[package]
name = "sh"
edition = "2024"

[dependencies]
semihosting = { version = "0.1.24", default-features = false, features = [
    "panic-handler",
    "stdio",
] }
minicov = { version = "0.3.8", default-features = false, optional = true }

[features]
codecov = ["dep:minicov", "semihosting/fs", "semihosting/random"]
